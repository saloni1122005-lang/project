<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Itinerary Builder - Traveloop</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <!-- Navigation -->
  <nav class="navbar">
    <div class="container flex-between">
      <a href="/" class="navbar-brand">🌍 Traveloop</a>
      <ul class="nav-links">
        <li><a href="/dashboard">Dashboard</a></li>
        <li><a href="/trips">My Trips</a></li>
        <li><a href="/profile">Profile</a></li>
        <li><a href="#" onclick="logout(); return false;">Logout</a></li>
      </ul>
    </div>
  </nav>

  <!-- Main Content -->
  <div class="container">
    <section class="header">
      <h1>Build Your Itinerary</h1>
      <p>Add cities, dates, and activities to your trip</p>
    </section>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; margin-bottom: 2rem;">
      <!-- Add City Section -->
      <div class="card">
        <div class="card-header">Add Cities to Your Trip</div>
        <div class="card-body">
          <div class="form-group">
            <label>Search City</label>
            <input type="text" id="citySearch" class="form-control" placeholder="Search for cities..." onkeyup="searchCities()">
            <div id="searchResults" style="margin-top: 1rem; max-height: 300px; overflow-y: auto;"></div>
          </div>

          <div class="form-group" style="margin-top: 1.5rem;">
            <label>Start Date</label>
            <input type="date" id="startDate" class="form-control">
          </div>

          <div class="form-group">
            <label>End Date</label>
            <input type="date" id="endDate" class="form-control">
          </div>

          <div class="form-group">
            <label>Notes (Optional)</label>
            <textarea id="cityNotes" class="form-control" placeholder="Add notes about this city..."></textarea>
          </div>

          <button class="btn btn-primary btn-block" onclick="addCityToItinerary()">Add City</button>
        </div>
      </div>

      <!-- Itinerary Preview -->
      <div class="card">
        <div class="card-header">Your Itinerary</div>
        <div class="card-body">
          <ul class="list-group" id="itineraryList"></ul>
          <p id="emptyItinerary" style="text-align: center; color: #636e72; margin-top: 1rem;">No cities added yet</p>
        </div>
      </div>
    </div>

    <!-- Activities Section -->
    <div class="card" style="margin-bottom: 2rem;">
      <div class="card-header">Add Activities</div>
      <div class="card-body">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.5rem;">
          <div class="form-group">
            <label>Select City</label>
            <select id="activityCity" class="form-control"></select>
          </div>

          <div class="form-group">
            <label>Activity Category</label>
            <select id="activityCategory" class="form-control">
              <option>Sightseeing</option>
              <option>Adventure</option>
              <option>Food & Dining</option>
              <option>Shopping</option>
              <option>Relaxation</option>
              <option>Other</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label>Search Activities</label>
          <input type="text" id="activitySearch" class="form-control" placeholder="Search activities...">
          <div id="activityResults" style="margin-top: 1rem; max-height: 300px; overflow-y: auto;"></div>
        </div>
      </div>
    </div>

    <a href="/trip/" class="btn btn-primary" style="margin-bottom: 2rem;">View Trip</a>
  </div>

  <script>
    let tripId;
    let selectedCityId = null;

    document.addEventListener('DOMContentLoaded', () => {
      const token = localStorage.getItem('authToken');
      if (!token) {
        window.location.href = '/login';
        return;
      }

      tripId = window.location.pathname.split('/')[2];
      if (!tripId) {
        window.location.href = '/trips';
        return;
      }

      // Update links
      document.querySelectorAll('a[href*="/trip/"]').forEach(link => {
        link.href = `/trip/${tripId}`;
      });

      loadItinerary();
    });

    async function searchCities() {
      const query = document.getElementById('citySearch').value;

      if (query.length < 2) {
        document.getElementById('searchResults').innerHTML = '';
        return;
      }

      try {
        const response = await fetch(`/api/cities/search?q=${encodeURIComponent(query)}`);
        const data = await response.json();

        if (data.success) {
          displaySearchResults(data.cities);
        }
      } catch (err) {
        console.error('Error searching cities:', err);
      }
    }

    function displaySearchResults(cities) {
      const container = document.getElementById('searchResults');
      container.innerHTML = '';

      cities.forEach(city => {
        const div = document.createElement('div');
        div.style.cssText = 'padding: 0.75rem; background: white; border: 1px solid var(--border); border-radius: 0.5rem; cursor: pointer; margin-bottom: 0.5rem;';
        div.innerHTML = `
          <strong>${city.name}</strong><br>
          <small style="color: #636e72;">${city.country}</small>
        `;
        div.onclick = () => selectCity(city.id, city.name, city.country);
        container.appendChild(div);
      });
    }

    function selectCity(cityId, cityName, countryName) {
      selectedCityId = cityId;
      document.getElementById('citySearch').value = `${cityName}, ${countryName}`;
      document.getElementById('searchResults').innerHTML = '';
    }

    async function addCityToItinerary() {
      const token = localStorage.getItem('authToken');

      if (!selectedCityId) {
        alert('Please select a city');
        return;
      }

      const startDate = document.getElementById('startDate').value;
      const endDate = document.getElementById('endDate').value;

      if (!startDate || !endDate) {
        alert('Please set start and end dates');
        return;
      }

      if (startDate >= endDate) {
        alert('End date must be after start date');
        return;
      }

      try {
        const response = await fetch(`/api/itinerary/add-city/${tripId}`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify({
            cityId: selectedCityId,
            sequenceOrder: new Date().getTime(),
            startDate,
            endDate,
            notes: document.getElementById('cityNotes').value
          })
        });

        const data = await response.json();
        if (data.success) {
          document.getElementById('citySearch').value = '';
          document.getElementById('startDate').value = '';
          document.getElementById('endDate').value = '';
          document.getElementById('cityNotes').value = '';
          selectedCityId = null;
          loadItinerary();
        }
      } catch (err) {
        console.error('Error adding city:', err);
        alert('Error adding city');
      }
    }

    async function loadItinerary() {
      const token = localStorage.getItem('authToken');

      try {
        const response = await fetch(`/api/itinerary/${tripId}`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });

        const data = await response.json();

        if (data.success) {
          displayItinerary(data.itinerary);
          updateActivityCitySelect(data.itinerary);
        }
      } catch (err) {
        console.error('Error loading itinerary:', err);
      }
    }

    function displayItinerary(itinerary) {
      const container = document.getElementById('itineraryList');
      const emptyMsg = document.getElementById('emptyItinerary');

      if (itinerary.length === 0) {
        container.innerHTML = '';
        emptyMsg.style.display = 'block';
        return;
      }

      emptyMsg.style.display = 'none';
      container.innerHTML = '';

      itinerary.forEach(item => {
        const li = document.createElement('li');
        li.className = 'list-group-item';
        li.innerHTML = `
          <div style="display: flex; justify-content: space-between; align-items: center;">
            <div>
              <strong>${item.city_name}, ${item.country}</strong><br>
              <small style="color: #636e72;">📅 ${new Date(item.start_date).toLocaleDateString()} - ${new Date(item.end_date).toLocaleDateString()}</small>
            </div>
            <button class="btn btn-danger btn-small" onclick="removeCity(${item.id})">Remove</button>
          </div>
        `;
        container.appendChild(li);
      });
    }

    function updateActivityCitySelect(itinerary) {
      const select = document.getElementById('activityCity');
      select.innerHTML = '';

      itinerary.forEach(item => {
        const option = document.createElement('option');
        option.value = item.id;
        option.textContent = item.city_name;
        select.appendChild(option);
      });
    }

    async function removeCity(itineraryId) {
      const token = localStorage.getItem('authToken');

      try {
        await fetch(`/api/itinerary/${itineraryId}`, {
          method: 'DELETE',
          headers: { 'Authorization': `Bearer ${token}` }
        });

        loadItinerary();
      } catch (err) {
        console.error('Error removing city:', err);
      }
    }

    function logout() {
      localStorage.removeItem('authToken');
      localStorage.removeItem('user');
      window.location.href = '/';
    }
  </script>
</body>
</html>
