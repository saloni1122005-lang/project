<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - Traveloop</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <!-- Navigation -->
  <nav class="navbar">
    <div class="container flex-between">
      <a href="/" class="navbar-brand">🌍 Traveloop</a>
      <ul class="nav-links">
        <li><a href="/">Home</a></li>
        <li><a href="/login">Login</a></li>
      </ul>
    </div>
  </nav>

  <!-- Main Content -->
  <div class="container">
    <div style="max-width: 500px; margin: 3rem auto;">
      <div class="card">
        <div class="card-header">
          Create Your Traveloop Account
        </div>
        <div class="card-body">
          <div id="alertContainer"></div>
          <form id="signupForm">
            <div class="form-group">
              <label for="name">Full Name</label>
              <input type="text" id="name" class="form-control" placeholder="Enter your name" required>
              <span class="error-message" id="nameError"></span>
            </div>

            <div class="form-group">
              <label for="email">Email Address</label>
              <input type="email" id="email" class="form-control" placeholder="Enter your email" required>
              <span class="error-message" id="emailError"></span>
            </div>

            <div class="form-group">
              <label for="password">Password</label>
              <input type="password" id="password" class="form-control" placeholder="Create a password (min 6 characters)" required>
              <span class="error-message" id="passwordError"></span>
            </div>

            <div class="form-group">
              <label for="confirmPassword">Confirm Password</label>
              <input type="password" id="confirmPassword" class="form-control" placeholder="Confirm your password" required>
              <span class="error-message" id="confirmPasswordError"></span>
            </div>

            <button type="submit" class="btn btn-secondary btn-block">Sign Up</button>
          </form>

          <p style="text-align: center; margin-top: 1.5rem;">
            Already have an account? <a href="/login" style="color: var(--primary); text-decoration: none; font-weight: 600;">Login here</a>
          </p>
        </div>
      </div>
    </div>
  </div>

  <script>
    const signupForm = document.getElementById('signupForm');
    const alertContainer = document.getElementById('alertContainer');

    signupForm.addEventListener('submit', async (e) => {
      e.preventDefault();

      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      // Clear previous errors
      document.getElementById('nameError').textContent = '';
      document.getElementById('emailError').textContent = '';
      document.getElementById('passwordError').textContent = '';
      document.getElementById('confirmPasswordError').textContent = '';

      // Validation
      let hasError = false;

      if (!name) {
        document.getElementById('nameError').textContent = 'Name is required';
        hasError = true;
      }

      if (!email) {
        document.getElementById('emailError').textContent = 'Email is required';
        hasError = true;
      }

      if (!password || password.length < 6) {
        document.getElementById('passwordError').textContent = 'Password must be at least 6 characters';
        hasError = true;
      }

      if (password !== confirmPassword) {
        document.getElementById('confirmPasswordError').textContent = 'Passwords do not match';
        hasError = true;
      }

      if (hasError) return;

      try {
        const response = await fetch('/api/auth/signup', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ name, email, password })
        });

        const data = await response.json();

        if (data.success) {
          localStorage.setItem('authToken', data.token);
          localStorage.setItem('user', JSON.stringify(data.user));
          showAlert('Account created successfully! Redirecting...', 'success');
          setTimeout(() => {
            window.location.href = '/dashboard';
          }, 1000);
        } else {
          showAlert(data.message || 'Signup failed', 'danger');
        }
      } catch (err) {
        showAlert('Error: ' + err.message, 'danger');
      }
    });

    function showAlert(message, type) {
      const alert = document.createElement('div');
      alert.className = `alert alert-${type}`;
      alert.textContent = message;
      alertContainer.innerHTML = '';
      alertContainer.appendChild(alert);
    }
  </script>
</body>
</html>
