<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Trips - Traveloop</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <!-- Navigation -->
  <nav class="navbar">
    <div class="container flex-between">
      <a href="/" class="navbar-brand">🌍 Traveloop</a>
      <ul class="nav-links">
        <li><a href="/dashboard">Dashboard</a></li>
        <li><a href="/trips">My Trips</a></li>
        <li><a href="/cities">Explore</a></li>
        <li><a href="/profile">Profile</a></li>
        <li><a href="#" onclick="logout(); return false;">Logout</a></li>
      </ul>
    </div>
  </nav>

  <!-- Main Content -->
  <div class="container">
    <section class="header">
      <h1>My Trips</h1>
      <p>Manage all your travel plans</p>
    </section>

    <div style="margin-bottom: 2rem;">
      <a href="/create-trip" class="btn btn-primary">+ Create New Trip</a>
    </div>

    <div id="tripsContainer" class="row"></div>
    <div id="noTripsMessage" class="text-center" style="padding: 3rem;">
      <p style="font-size: 1.2rem; color: #636e72;">No trips yet. <a href="/create-trip" style="color: var(--primary); text-decoration: none; font-weight: 600;">Create your first trip!</a></p>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const token = localStorage.getItem('authToken');
      if (!token) {
        window.location.href = '/login';
        return;
      }

      loadTrips();
    });

    async function loadTrips() {
      const token = localStorage.getItem('authToken');

      try {
        const response = await fetch('/api/trips', {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        const data = await response.json();

        if (data.success) {
          displayTrips(data.trips);
        }
      } catch (err) {
        console.error('Error loading trips:', err);
      }
    }

    function displayTrips(trips) {
      const container = document.getElementById('tripsContainer');
      const noTripsMessage = document.getElementById('noTripsMessage');

      if (trips.length === 0) {
        container.style.display = 'none';
        noTripsMessage.style.display = 'block';
        return;
      }

      noTripsMessage.style.display = 'none';
      container.innerHTML = '';

      trips.forEach(trip => {
        const startDate = new Date(trip.start_date);
        const endDate = new Date(trip.end_date);
        const dateRange = `${startDate.toLocaleDateString()} - ${endDate.toLocaleDateString()}`;
        const days = Math.ceil((endDate - startDate) / (1000 * 60 * 60 * 24));

        const card = document.createElement('div');
        card.className = 'trip-card';
        card.innerHTML = `
          <div class="trip-card-image" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
            ${trip.image ? `<img src="${trip.image}" alt="${trip.name}" style="width: 100%; height: 100%; object-fit: cover;">` : ''}
          </div>
          <div class="trip-card-body">
            <div class="trip-card-title">${trip.name}</div>
            <div class="trip-card-date">📅 ${dateRange}</div>
            <div class="trip-card-info">
              <span>⏱️ ${days} days</span>
              <span>🏙️ ${trip.destinationCount || 0} cities</span>
            </div>
            <p style="color: #636e72; font-size: 0.9rem; margin-bottom: 1rem;">
              ${trip.description ? trip.description.substring(0, 100) + '...' : 'No description'}
            </p>
            <div class="trip-card-actions">
              <a href="/trip/${trip.id}" class="btn btn-primary btn-small">View</a>
              <a href="/itinerary/${trip.id}" class="btn btn-secondary btn-small">Itinerary</a>
              <button class="btn btn-danger btn-small" onclick="deleteTrip(${trip.id})">Delete</button>
            </div>
          </div>
        `;
        container.appendChild(card);
      });
    }

    async function deleteTrip(tripId) {
      if (!confirm('Are you sure you want to delete this trip?')) return;

      const token = localStorage.getItem('authToken');

      try {
        const response = await fetch(`/api/trips/${tripId}`, {
          method: 'DELETE',
          headers: { 'Authorization': `Bearer ${token}` }
        });
        const data = await response.json();

        if (data.success) {
          loadTrips();
          alert('Trip deleted successfully');
        }
      } catch (err) {
        console.error('Error deleting trip:', err);
        alert('Error deleting trip');
      }
    }

    function logout() {
      localStorage.removeItem('authToken');
      localStorage.removeItem('user');
      window.location.href = '/';
    }
  </script>
</body>
</html>
